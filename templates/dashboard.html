<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Air Pollution Intelligence</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body class="bg-slate-950 text-white">

<div class="max-w-7xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6">Air Pollution Intelligence</h1>

<div id="alertBox" class="hidden bg-red-500 p-3 mb-4 rounded"></div>

<!-- TOP -->
<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="bg-slate-800 p-4 rounded">
    <p>AQI</p>
    <h2 id="aqiValue" class="text-3xl">--</h2>
    <p id="aqiStatus">Waiting</p>
  </div>

  <div class="bg-slate-800 p-4 rounded">
    <p>NO2</p>
    <h2 id="no2Value">--</h2>
  </div>

  <div class="bg-slate-800 p-4 rounded">
    <p>O3</p>
    <h2 id="o3Value">--</h2>
  </div>
</div>

<div class="grid grid-cols-2 gap-6">

<!-- FORM -->
<div class="bg-slate-800 p-4 rounded">
  <form id="predictForm" class="space-y-2">
    <input name="site" value="1" class="w-full p-2 bg-slate-700 rounded">
    <input name="temp" placeholder="Temp" class="w-full p-2 bg-slate-700 rounded">
    <input name="humidity" placeholder="Humidity" class="w-full p-2 bg-slate-700 rounded">
    <input name="wind" placeholder="Wind" class="w-full p-2 bg-slate-700 rounded">
    <input name="sat_no2" placeholder="NO2" class="w-full p-2 bg-slate-700 rounded">
    <input name="hcho" placeholder="HCHO" class="w-full p-2 bg-slate-700 rounded">

    <button class="w-full bg-cyan-500 p-2 rounded text-black">
      Run Prediction
    </button>
  </form>
</div>

<!-- CHART -->
<div class="bg-slate-800 p-4 rounded">
  <canvas id="chart"></canvas>
</div>

</div>

<!-- MAP -->
<div class="bg-slate-800 p-4 rounded mt-6">
  <div id="map" style="height:400px;"></div>
</div>

</div>

<script>
let chart;
let map = L.map('map').setView([20.5937, 78.9629], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markerLayer = L.layerGroup().addTo(map);

document.getElementById("predictForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  try {
    const res = await fetch("/predict", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    console.log(data);

    if (!data.prediction) {
      throw new Error("Invalid response");
    }

    const p = data.prediction;

    // UPDATE CARDS
    document.getElementById("aqiValue").innerText = p.aqi;
    document.getElementById("aqiStatus").innerText = p.status;
    document.getElementById("no2Value").innerText = p.no2;
    document.getElementById("o3Value").innerText = p.o3;

    // UPDATE CHART
    const labels = Object.keys(data.comparison.aqi_by_site);
    const values = Object.values(data.comparison.aqi_by_site);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "AQI",
          data: values,
          backgroundColor: "#22c55e"
        }]
      }
    });

    // UPDATE MAP
    markerLayer.clearLayers();

    const coords = [
      [19.0760,72.8777],
      [28.7041,77.1025],
      [13.0827,80.2707],
      [22.5726,88.3639],
      [23.0225,72.5714],
      [17.3850,78.4867],
      [12.9716,77.5946]
    ];

    labels.forEach((label, i) => {
      L.marker(coords[i])
        .bindPopup(`${label}: ${values[i]}`)
        .addTo(markerLayer);
    });

  } catch (err) {
    console.error(err);
    alert("Server error occurred");
  }
});
</script>

</body>
</html>
